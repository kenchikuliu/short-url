name: ga4-gsc-pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '26 3 * * 1'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      GOOGLE_API_ACCESS_TOKEN: ${{ secrets.GOOGLE_API_ACCESS_TOKEN }}
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      PIPELINE_SITE_ORIGIN: ${{ secrets.PIPELINE_SITE_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate required env
        run: |
          missing=0
          for key in GA4_PROPERTY_ID GSC_SITE_URL; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required env: $key" >&2
              missing=1
            fi
          done
          if [ -z "${GOOGLE_API_ACCESS_TOKEN:-}" ]; then
            for key in GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET GOOGLE_OAUTH_REFRESH_TOKEN; do
              if [ -z "${!key:-}" ]; then
                echo "Missing OAuth env: $key" >&2
                missing=1
              fi
            done
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run GA4+GSC pipeline
        run: npm run ga4:gsc:pipeline

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ga4-gsc-pipeline
          path: tmp/ga4-gsc-pipeline
